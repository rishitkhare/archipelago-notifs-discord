steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--tag', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/argobot', '.']
  env:
  - 'DOCKER_BUILDKIT=1'
images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/argobot'

options:
  logging: CLOUD_LOGGING_ONLY