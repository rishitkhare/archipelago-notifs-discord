steps:

# Build the image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--tag', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/argobot', '.']
  env:
  - 'DOCKER_BUILDKIT=1'

# Push the image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'push', 
    'us-central1-docker.pkg.dev/the-argo-490500/cloud-run-source-deploy/argobot'
  ]

# 3. Deploy the image to Cloud Run
# - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
#   entrypoint: gcloud
#   args:
#     - 'compute'
#     - 'instances'
#     - 'update-container'
#     - 'argobot-vm'
#     - '--zone'
#     - 'us-central1-a'
#     - '--container-image'
#     - 'us-central1-docker.pkg.dev/the-argo-490500/cloud-run-source-deploy/argobot'
#     - '--container-env-file'
#     - '/home/kharerishit/.env'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "Waiting for SSH key propagation..."
      sleep 10
      gcloud compute ssh kharerishit@argobot-vm --zone=us-central1-a --tunnel-through-iap --command=" \
        docker-credential-gcr configure-docker --quiet && \
        docker pull gcr.io/$PROJECT_ID/argobot:latest && \
        docker stop argobot || true && \
        docker rm argobot || true && \
        docker run -d \
          --name argobot \
          --env-file /home/kharerishit/.env \
          --restart unless-stopped \
          gcr.io/$PROJECT_ID/argobot:latest"

images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/argobot'

options:
  logging: CLOUD_LOGGING_ONLY